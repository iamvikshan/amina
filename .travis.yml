# Travis CI Configuration for Amina Discord Bot
# Uses Doppler CLI for secrets management
# Free for students: https://education.travis-ci.com/

language: minimal
os: linux
dist: jammy

# Cache Bun's dependency store
cache:
  directories:
    - ~/.bun/install/cache

# Environment variables (DOPPLER_TOKEN should be set in Travis CI settings)
env:
  global:
    - DOPPLER_PROJECT=amina
    - DOPPLER_CONFIG=stg
    - BUN_INSTALL="$HOME/.bun"
    - PATH="$HOME/.bun/bin:$PATH"

stages:
  - name: bot-smoke
    if: (type = pull_request AND branch = main) OR (type = push AND branch = main)
  - name: docker-smoke
    if: (type = pull_request AND branch = main) OR (type = push AND branch = main)

jobs:
  include:
    # ============================================
    # Stage: Bot Smoke
    # ============================================
    - stage: bot-smoke
      name: 'Bot Validation & Native Runtime Smoke'
      before_install:
        # Install Doppler CLI for secrets
        - curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
        - echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" | sudo tee /etc/apt/sources.list.d/doppler-cli.list
        - sudo apt-get update && sudo apt-get install -y doppler
        # Install Bun
        - curl -fsSL https://bun.sh/install | bash
      install:
        # Install dependencies (Bun is the sole package manager)
        - bun install --frozen-lockfile --ignore-scripts

      # script:
      #   # 1. Run canonical lint + typecheck (oxlint + tsgo --noEmit)
      #   - bun check

        # 2. Load secrets from Doppler (or fall back to minimal test env)
        - |
          if [ -n "$DOPPLER_TOKEN" ]; then
            doppler secrets download -p amina -c stg --no-file --format env > .env
            echo "Doppler secrets loaded for native runtime test"
          else
            echo "DOPPLER_TOKEN not set, using minimal test env"
            echo "NODE_ENV=test" > .env
            echo "HEALTH_PORT=3000" >> .env
          fi

        # 3. Start app in background and test production readiness
        - |
          echo "Starting native Bun runtime test..."
          mkdir -p logs
          : > logs/app.log
          tail -n +1 -f logs/app.log &
          TAIL_PID=$!
          bun . > logs/app.log 2>&1 &
          APP_PID=$!
          echo "App started with PID $APP_PID"
          echo "Streaming app logs in background with PID $TAIL_PID"

          # Wait for health endpoint
          echo "Waiting for app to be healthy..."
          for i in {1..30}; do
            if curl -f -s http://localhost:${HEALTH_PORT:-3000}/health > /dev/null 2>&1; then
              echo "Native app is healthy"
              kill $TAIL_PID 2>/dev/null || true
              wait $TAIL_PID 2>/dev/null || true
              kill $APP_PID 2>/dev/null || true
              wait $APP_PID 2>/dev/null || true
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done

          # Health check failed - stop log streamer and exit
          echo "Native health check failed"
          kill $TAIL_PID 2>/dev/null || true
          wait $TAIL_PID 2>/dev/null || true
          kill $APP_PID 2>/dev/null || true
          wait $APP_PID 2>/dev/null || true
          exit 1

      after_script:
        # Cleanup: Ensure process is killed and secrets are removed
        - pkill -f "bun ." || true
        - rm -f .env
        - rm -rf logs

    # ============================================
    # Stage: Docker Smoke
    # ============================================
    - stage: docker-smoke
      name: 'Docker Compose Health Smoke'
      services:
        - docker
      install: skip # Docker stage builds inside the container — no Bun install needed
      before_install:
        # Install Doppler CLI for secrets
        - curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
        - echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" | sudo tee /etc/apt/sources.list.d/doppler-cli.list
        - sudo apt-get update && sudo apt-get install -y doppler
      script:
        # Load secrets from Doppler (or fall back to minimal test env)
        - |
          if [ -n "$DOPPLER_TOKEN" ]; then
            doppler secrets download -p amina -c stg --no-file --format env > .env
            echo "Doppler secrets loaded from amina/stg"
          else
            echo "DOPPLER_TOKEN not set, using minimal test env"
            echo "NODE_ENV=test" > .env
            echo "HEALTH_PORT=3000" >> .env
          fi

        # Build and start services with docker compose
        - docker compose build amina
        - docker compose up -d amina

        # Wait for amina container to be healthy
        - |
          echo "Waiting for amina container to start..."
          for i in {1..30}; do
            if curl -f -s http://localhost:${HEALTH_PORT:-3000}/health > /dev/null 2>&1; then
              echo "Amina container is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Container health check failed"
          docker compose logs amina
          exit 1
      after_script:
        - docker compose down -v || true
        - rm -f .env

# Notifications (optional)
notifications:
  email:
    on_success: never
    on_failure: change
