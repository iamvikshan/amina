name: Releases

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/releases.yml"
      - "src/**"
      - "cli/**"
      - "Dockerfile"

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Pre-build: Bot Check
  # ============================================
  check-bot:
    name: Bot Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node, Bun, and install dependencies
        uses: iamvikshan/.github/.github/actions/setup-node-bun@main

      - name: Run bot checks
        shell: bash
        run: |
          set -euo pipefail

          temp_tsconfig=$(mktemp ./tsconfig.bot-check.XXXXXX.json)
          temp_eslint_config=$(mktemp ./eslint.bot-check.XXXXXX.mjs)
          trap 'rm -f "$temp_tsconfig" "$temp_eslint_config"' EXIT

          cat <<'EOF' > "$temp_tsconfig"
          {
            "extends": "./tsconfig.json",
            "include": ["src/**/*", "types/**/*"],
            "exclude": [
              "tests/**/*",
              "api/**/*",
              "cli/**/*",
              "node_modules",
              "**/node_modules/*",
              "dist",
              "build",
              "logs",
              "types/api/**/*"
            ]
          }
          EOF

          cat <<EOF > "$temp_eslint_config"
          import baseConfig from './eslint.config.mjs'

          export default [
            ...baseConfig,
            {
              files: ['src/**/*.ts', 'types/**/*.ts'],
              languageOptions: {
                parserOptions: {
                  project: ['$temp_tsconfig'],
                },
              },
            },
          ]
          EOF

          bunx eslint --config "$temp_eslint_config" src types

          bunx tsc --noEmit --project "$temp_tsconfig"

  # ============================================
  # Pre-build: CLI Check
  # ============================================
  check-cli:
    name: CLI Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node, Bun, and install dependencies
        uses: iamvikshan/.github/.github/actions/setup-node-bun@main

      - name: Run CLI checks
        run: |
          bun run cli:check
          bun run cli:test
          bun run cli:build
          node cli/dist/index.js help
          (
            cd cli
            npm pack --dry-run >/dev/null
            current_version=$(node -p "require('./package.json').version")
            tmp_npmrc=$(mktemp)
            printf '//registry.npmjs.org/:_authToken=dummy\n' > "$tmp_npmrc"
            NPM_CONFIG_WORKSPACES_UPDATE=false npm version "$current_version" --userconfig "$tmp_npmrc" --no-git-tag-version --allow-same-version >/dev/null
            rm -f "$tmp_npmrc"
            git checkout -- package.json
          )

  # ============================================
  # Bot Semantic Release
  # ============================================
  release-bot:
    name: Bot Release
    runs-on: ubuntu-latest
    needs: check-bot
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      release_version: ${{ steps.semantic.outputs.release_version }}
      release_git_tag: ${{ steps.semantic.outputs.release_git_tag }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node, Bun, and install dependencies
        uses: iamvikshan/.github/.github/actions/setup-node-bun@main

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ github.actor }}
          GIT_COMMITTER_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: |
          bun -e "
            import semanticRelease from 'semantic-release';
            import { appendFileSync } from 'node:fs';
            try {
              const result = await semanticRelease();
              if (result && result.nextRelease && result.nextRelease.version) {
                appendFileSync(
                  process.env.GITHUB_OUTPUT,
                  'new_release_published=true\n' +
                    'release_version=' + result.nextRelease.version + '\n' +
                    'release_git_tag=' + result.nextRelease.gitTag + '\n'
                );
                console.log('Published release ' + result.nextRelease.version);
              } else {
                appendFileSync(
                  process.env.GITHUB_OUTPUT,
                  'new_release_published=false\nrelease_version=\nrelease_git_tag=\n'
                );
                console.log('No new release published');
              }
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          "

  # ============================================
  # CLI Release (npm only)
  # ============================================
  release-cli:
    name: CLI Release
    runs-on: ubuntu-latest
    needs: [check-cli, release-bot]
    if: >-
      always() &&
      needs['check-cli'].result == 'success' &&
      contains(fromJSON('["success", "skipped"]'), needs['release-bot'].result) &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Bun and Node
        uses: iamvikshan/.github/.github/actions/setup-node-bun@main

      - name: Sync with remote
        run: |
          git checkout main
          git pull --rebase --autostash origin main

      - name: CLI Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_WORKSPACES_UPDATE: "false"
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ github.actor }}
          GIT_COMMITTER_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: |
          bun -e "
            import semanticRelease from 'semantic-release';
            try {
              const cliConfig = (await import('./cli/release.config.mjs')).default;
              const result = await semanticRelease(cliConfig);
              const version = result?.nextRelease?.version;
              if (version) {
                console.log('Published CLI release ' + version);
              } else {
                console.log('No new CLI release');
              }
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          "

  # ============================================
  # Docker Build & Push (Multi-platform, Multi-registry)
  # ============================================
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: release-bot
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' &&
      needs['release-bot'].result == 'success' &&
      needs['release-bot'].outputs.new_release_published == 'true'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      GITHUB_REGISTRY: ghcr.io
      GITLAB_REGISTRY: registry.gitlab.com
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      # Login to all registries
      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: vikshan
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: registry.gitlab.com
          username: oauth2
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: |
            vikshan/amina
            ghcr.io/${{ github.repository }}
            registry.gitlab.com/vikshan/amina
          tags: |
            type=raw,value=${{ needs['release-bot'].outputs.release_version }}
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: docker.io/vikshan/amina
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v5.0.0
        with:
          username: vikshan
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: vikshan/amina
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md
          enable-url-completion: true
