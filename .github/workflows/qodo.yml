name: PR Agent (Gemini)

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    # Ensure the bot does not trigger feedback loops on its own comments
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: PR Agent action step
        uses: The-PR-Agent/pr-agent@v0.38.0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI }}
