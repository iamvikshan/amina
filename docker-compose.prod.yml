services:
  # Amina Discord Bot
  amina:
    image: vikshan/amina:latest
    container_name: amina
    restart: unless-stopped
    command: ["run", "src/index.ts"]
    depends_on:
      lavalink:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override Lavalink connection to use Docker network
      LAVALINK_1_HOST: lavalink
      LAVALINK_1_PORT: 2333
      HEALTH_PORT: 3000
    networks:
      - amina-network
    healthcheck:
      test: ["CMD", "bun", "run", "src/services/health.ts"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Lavalink Music Server
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest
    container_name: lavalink
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - _JAVA_OPTIONS=-Xmx512M -Xms256M
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASS}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    entrypoint:
      - /bin/sh
      - -c
      - |
        wget -qO /tmp/application.yml https://raw.githubusercontent.com/iamvikshan/amina/refs/heads/main/lavalink/application.yml
        exec java -jar Lavalink.jar --spring.config.additional-location=file:/tmp/application.yml
    networks:
      - amina-network
    healthcheck:
      test: [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider --header='Authorization: ${LAVALINK_PASS:-thoushantpass}' http://localhost:2333/version || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Cloudflare Tunnel - Secure access without exposing public IP
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    env_file:
      - .env
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL}
      - TUNNEL_METRICS=0.0.0.0:2000
    networks:
      - amina-network
    healthcheck:
      test:
        ["CMD", "cloudflared", "tunnel", "--metrics", "0.0.0.0:2000", "ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Watchtower - Automatic container updates
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      # Update behavior
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_INCLUDE_STOPPED=false
      # Rolling restart disabled: containers have depends_on chains
      # incompatible with rolling restarts (watchtower restarts all at once)
      - WATCHTOWER_ROLLING_RESTART=false
      # Discord notifications (uses LOGS_WEBHOOK from .env)
      - WATCHTOWER_NOTIFICATION_URL=${LOGS_WEBHOOK}
    networks:
      - amina-network

networks:
  amina-network:
    driver: bridge