services:
  amina:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: amina
    restart: 'no'
    depends_on:
      lavalink:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - amina-network
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    healthcheck:
      test: ['CMD', 'bun', 'run', 'src/services/health.ts']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest
    container_name: lavalink
    restart: 'no'
    env_file:
      - .env
    environment:
      - _JAVA_OPTIONS=-Xmx512M -Xms256M
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASS}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      # Directly mount the local dev config file - no root scripts required
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    networks:
      - amina-network
    ports:
      - '2333:2333'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "wget --no-verbose --tries=1 --spider --header='Authorization: ${LAVALINK_PASS:-thoushantpass}' http://localhost:2333/version || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  amina-network:
    driver: bridge
